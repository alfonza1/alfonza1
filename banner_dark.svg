<svg xmlns="http://www.w3.org/2000/svg" width="860" height="250" viewBox="0 0 860 250" role="img" aria-label="Alfonza — Full-Stack Developer @ JPMorgan Chase">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d9fff"/>
      <stop offset="1" stop-color="#39d353"/>
    </linearGradient>
  </defs>
  <style>
    .draw { fill: none; stroke: url(#g); stroke-linecap: round; stroke-linejoin: round; }
    .hex  { stroke-width: 3.5; stroke-dasharray: 396; stroke-dashoffset: 396;
            animation: draw 1.2s ease forwards 0.15s; }
    .mono { stroke-width: 9; stroke-dasharray: 200; stroke-dashoffset: 200;
            animation: draw 0.9s ease forwards 0.95s; }
    .fill { opacity: 0; animation: fade 0.9s ease forwards 0.35s; }
    .ring { fill: none; stroke: url(#g); stroke-width: 2; transform-box: fill-box;
            transform-origin: center; opacity: 0; animation: pulse 3.4s ease-out infinite 1.7s; }
    .rin  { opacity: 0; animation: rin 0.5s ease forwards; }
    @keyframes draw  { to { stroke-dashoffset: 0; } }
    @keyframes fade  { to { opacity: 1; } }
    @keyframes rin   { from { opacity: 0; transform: translateX(9px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.45; } 100% { transform: scale(1.55); opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .hex,.mono { stroke-dashoffset: 0; animation: none; }
      .fill,.rin { opacity: 1; animation: none; } .ring { display: none; }
    }
  </style>
  <rect x="1" y="1" width="858" height="248" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- logo -->
  <path class="draw ring" d="M120.0 59.0 L177.2 92.0 L177.2 158.0 L120.0 191.0 L62.8 158.0 L62.8 92.0 Z"/>
  <path class="fill" d="M120.0 59.0 L177.2 92.0 L177.2 158.0 L120.0 191.0 L62.8 158.0 L62.8 92.0 Z" fill="url(#g)" fill-opacity="0.08" stroke="none"/>
  <path class="draw hex" d="M120.0 59.0 L177.2 92.0 L177.2 158.0 L120.0 191.0 L62.8 158.0 L62.8 92.0 Z"/>
  <path class="draw mono" d="M93 167 L120 88 L147 167 M105 138 L135 138"/>

  <!-- divider -->
  <line class="fill" x1="208" y1="52" x2="208" y2="198" stroke="#30363d" stroke-width="1"/>

  <!-- name + handle -->
  <text x="232" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="33" font-weight="800" fill="#e6edf3" class="rin" style="animation-delay:1.42s">Alfonza</text>
  <circle cx="384" cy="70" r="4" fill="#3fb950" class="rin" style="animation-delay:1.51s"/>
  <text x="395" y="75" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,'Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" fill="#8b949e" class="rin" style="animation-delay:1.60s">@alfonza1</text>

  <!-- role -->
  <text x="232" y="104" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" class="rin" style="animation-delay:1.69s">
    <tspan fill="#58a6ff" font-weight="700">Full-Stack Developer</tspan><tspan fill="#8b949e"> @ JPMorgan Chase</tspan>
  </text>

  <!-- tagline -->
  <text x="232" y="128" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13.5" fill="#8b949e" class="rin" style="animation-delay:1.78s">I build production-ready web apps, backend APIs &amp; cloud workflows.</text>

  <!-- badges -->
  <g class="rin" style="animation-delay:0.70s"><rect x="232" y="150" width="57" height="26" rx="13" fill="#58a6ff" fill-opacity="0.13" stroke="#58a6ff" stroke-opacity="0.4"/><text x="260.5" y="167.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#58a6ff">Java</text></g><g class="rin" style="animation-delay:0.79s"><rect x="297" y="150" width="101" height="26" rx="13" fill="#58a6ff" fill-opacity="0.13" stroke="#58a6ff" stroke-opacity="0.4"/><text x="347.5" y="167.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#58a6ff">TypeScript</text></g><g class="rin" style="animation-delay:0.88s"><rect x="406" y="150" width="108" height="26" rx="13" fill="#3fb950" fill-opacity="0.13" stroke="#3fb950" stroke-opacity="0.4"/><text x="460" y="167.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#3fb950">Spring Boot</text></g><g class="rin" style="animation-delay:0.97s"><rect x="522" y="150" width="65" height="26" rx="13" fill="#3fb950" fill-opacity="0.13" stroke="#3fb950" stroke-opacity="0.4"/><text x="554.5" y="167.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#3fb950">React</text></g><g class="rin" style="animation-delay:1.06s"><rect x="232" y="182" width="101" height="26" rx="13" fill="#39c5cf" fill-opacity="0.13" stroke="#39c5cf" stroke-opacity="0.4"/><text x="282.5" y="199.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#39c5cf">PostgreSQL</text></g><g class="rin" style="animation-delay:1.15s"><rect x="341" y="182" width="65" height="26" rx="13" fill="#39c5cf" fill-opacity="0.13" stroke="#39c5cf" stroke-opacity="0.4"/><text x="373.5" y="199.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#39c5cf">Kafka</text></g><g class="rin" style="animation-delay:1.24s"><rect x="414" y="182" width="50" height="26" rx="13" fill="#bc8cff" fill-opacity="0.13" stroke="#bc8cff" stroke-opacity="0.4"/><text x="439" y="199.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#bc8cff">AWS</text></g><g class="rin" style="animation-delay:1.33s"><rect x="472" y="182" width="72" height="26" rx="13" fill="#bc8cff" fill-opacity="0.13" stroke="#bc8cff" stroke-opacity="0.4"/><text x="508" y="199.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#bc8cff">Docker</text></g>

  <!-- meta -->
  <text x="232" y="222" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,'Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="12.5" class="rin" style="animation-delay:1.87s"><tspan fill="#8b949e">Philadelphia, PA</tspan><tspan fill="#30363d">   ·   </tspan><tspan fill="#8b949e">up </tspan><tspan fill="#3fb950">26 years, 4 months, 18 days</tspan><tspan fill="#30363d">   ·   </tspan><tspan fill="#58a6ff">31</tspan><tspan fill="#8b949e"> repos</tspan><tspan fill="#30363d">   ·   </tspan><tspan fill="#58a6ff">487</tspan><tspan fill="#8b949e"> commits</tspan></text>
</svg>
