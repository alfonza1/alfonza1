name: Update profile uptime

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-uptime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate profile cards
        run: |
          node generate.mjs
          node generate-banner.mjs

      - name: Commit changed uptime
        run: |
          git add dark_mode.svg light_mode.svg banner_dark.svg banner_light.svg
          if git diff --cached --quiet; then
            echo "Profile uptime is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "profile: refresh birthday uptime"
          git push
